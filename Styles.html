<style>
  :root {
    --background: #f3f5f7;
    --surface: #ffffff;
    --surface-subtle: #f8fafc;
    --text: #17212f;
    --muted: #5b6472;
    --border: #d6dde8;
    --accent: #0f6b5f;
    --accent-soft: #e8f4f1;
    --danger: #a11f1f;
    --danger-soft: #fff1f1;
    --warning: #9a5a00;
    --warning-soft: #fff7df;
    --shadow: 0 12px 30px rgba(16, 24, 40, 0.08);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--background);
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
  }

  .app-shell {
    max-width: 1440px;
    margin: 0 auto;
    padding: 28px;
  }

  .app-header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 22px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .app-header h1 {
    margin: 0 0 8px;
    font-size: 30px;
    line-height: 1.15;
    font-weight: 700;
  }

  .app-header p {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }

  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(12, minmax(0, 1fr));
    gap: 16px;
  }

  .panel {
    grid-column: span 6;
    min-height: 120px;
    overflow: hidden;
    padding: 18px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    box-shadow: var(--shadow);
  }

  .panel > div {
    overflow-x: auto;
  }

  .panel-wide {
    grid-column: span 12;
  }

  .panel-primary {
    grid-column: span 7;
  }

  .panel-compact {
    grid-column: span 5;
  }

  .panel h2 {
    margin: 0 0 14px;
    font-size: 16px;
    line-height: 1.3;
    font-weight: 700;
  }

  table {
    width: 100%;
    min-width: 520px;
    border-collapse: collapse;
    font-size: 13px;
  }

  #kpi-strip table,
  #attrition table,
  #health-score table {
    min-width: 0;
  }

  th,
  td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: middle;
  }

  th {
    background: var(--surface-subtle);
    color: var(--muted);
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
  }

  tbody tr:last-child td {
    border-bottom: 0;
  }

  .row-overdue td {
    background: var(--danger-soft);
    color: var(--danger);
  }

  .row-imminent td {
    background: var(--warning-soft);
    color: var(--warning);
  }

  .filter-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 12px;
  }

  .filter-grid label {
    display: grid;
    gap: 4px;
    color: var(--muted);
    font-size: 12px;
  }

  select {
    width: 100%;
    min-height: 34px;
    padding: 0 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font: inherit;
  }

  .error-view {
    padding: 16px;
    border: 1px solid #fecaca;
    border-radius: 8px;
    background: #fff1f2;
    color: var(--danger);
  }

  @media (max-width: 800px) {
    .app-shell {
      padding: 18px;
    }

    .app-header {
      display: block;
    }

    .app-header h1 {
      font-size: 24px;
    }

    .dashboard-grid {
      grid-template-columns: repeat(1, minmax(0, 1fr));
    }

    .panel,
    .panel-wide,
    .panel-primary,
    .panel-compact {
      grid-column: span 1;
    }

    .filter-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
