<style>
  :root {
    --background: #f7f8fa;

    --accent: #1663ff;
    --danger: #b42318;
    --warning: #b54708;

    margin: 0 auto;
    padding: 24px;

    margin: 0 0 8px;
    font-size: 28px;
    line-height: 1.2;
  }

  .app-header p {
    margin: 0;
    color: var(--muted);
  }

    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));

  }

  .panel {
    min-height: 120px;
    padding: 16px;

    border-radius: 8px;

    margin: 0 0 12px;
    font-size: 16px;
