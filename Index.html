<!doctype html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Techolution HR Automation Dashboard</title>
    <?!= include("Styles"); ?>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <h1>Techolution HR Automation Dashboard</h1>
          <p id="status">Loading dashboard data...</p>
        </div>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle color theme">
          Theme: Auto
        </button>
      </header>

      <section class="dashboard-grid" id="dashboard-root" aria-live="polite">
        <article class="panel panel-wide">
          <h2>KPI Strip</h2>
          <div id="kpi-strip"></div>
        </article>

        <article class="panel panel-primary">
          <h2>Alerts</h2>
          <div id="alerts"></div>
        </article>

        <article class="panel">
          <h2>Department Breakdown</h2>
          <div id="department-breakdown"></div>
        </article>

        <article class="panel panel-compact">
          <h2>Quarterly Attrition</h2>
          <div id="attrition"></div>
        </article>

        <article class="panel panel-compact">
          <h2>Risk Register</h2>
          <div id="risk-register"></div>
        </article>

        <article class="panel panel-compact">
          <h2>HR Health Score</h2>
          <div id="health-score"></div>
        </article>

        <article class="panel">
          <h2>Org Chart</h2>
          <div id="org-chart"></div>
        </article>

        <article class="panel panel-wide">
          <h2>Drill-Down</h2>
          <div class="filter-grid" id="drilldown-filters">
            <label>Region<select id="filter-region"></select></label>
            <label>Department<select id="filter-department"></select></label>
            <label>Reporting Manager<select id="filter-manager"></select></label>
            <label>Employment Status<select id="filter-status"></select></label>
          </div>
          <div id="drill-down"></div>
        </article>
      </section>

      <section class="error-view" id="error-view" hidden>
        <h2>Unable to load dashboard</h2>
        <p id="error-message"></p>
      </section>
    </main>

    <script>
      window.__INITIAL_DASHBOARD_PAYLOAD__ = <?!= initialPayload ?>;
    </script>

</html>
